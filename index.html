<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-left-text">A game by Bluez62</div>
    <header>
        <h1>Bluez Clicker</h1>
        <p id="ver">V1.1.7</p>
    </header>
    <main>
        <h3 id="counter">0 Clicks</h3>
        <button onclick="doClick(event)">Click Me!</button>
        <button id="cpc1counter" onclick="onecpc()">+1 CPC - Cost: 100</button>
        <button id="cps1counter" onclick="onecps()">+1 CPC - Cost: 50</button>
        <button id="cHcounter" onclick="criticalHits()">Critical Hits - Cost: 500</button>
        
        <div class="save-controls">
            <button id="exportBtn">Export Save</button>
            <button id="importBtn">Import Save</button>
            <button id="wipeBtn" onclick="wipeData()">Wipe Data</button>
        </div>
    </main>

    <input type="file" id="fileInput" accept=".json" style="display: none;">
    
    <script src="script.js" defer></script>
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <h2>Wipe All Progress?</h2>
            <p>Are you absolutely sure? You will lose all your clicks and upgrades permanently.</p>
            <div class="modal-buttons">
            <button id="cancelWipeBtn" onclick="closeModel()">Cancel</button>
            <button id="confirmWipeBtn" onclick="executeWipe()">Yes, Wipe It</button>
            </div>
        </div>
    </div>
</body>
</html>
